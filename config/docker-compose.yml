services:
  codex-proxy:
    build: .
    container_name: codex-proxy
    ports:
      - "8765:8765"
    volumes:
      - ${HOME}/.gemini:/home/appuser/.gemini:rw
      - ${HOME}/.config/codex-proxy:/home/appuser/.config/codex-proxy:ro
      - ./src:/app/src:rw
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=codex-proxy"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}